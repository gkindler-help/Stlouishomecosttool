<!-- VERSION 2: Lead Tool + Report Builder + SF Calculator Integration -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Cost Tool | George Kindler</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js">function buildReportText(){
  const name = document.getElementById('userName').value || 'there';
  let text = `Hey ${name},

Here’s your home cost breakdown:

`;
  report.forEach(i=>{
    text += `• ${i.name}: $${i.low}–$${i.high}
`;
  });
  if(window.reportTotals){
    text += `
Estimated Total: $${window.reportTotals.low} – $${window.reportTotals.high}
`;
  }
  text += `

What I’d pay attention to:
– Major systems drive your real cost
– Cosmetic items are negotiable

If you want a second opinion before making an offer, I’m happy to help.

– George

Built using George Kindler’s Home Cost Tool`;
  return text;
}

function sendReport(){
  const email = document.getElementById('userEmail').value;
  const ccMe = document.getElementById('ccMe').checked;
  let subject = "Home Cost Report";
  let body = buildReportText();
  let mailto = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  if(ccMe){ mailto += `&cc=whatsyourstlouishomeworth@gmail.com`; }
  window.location.href = mailto;
}

function copyReport(){
  const text = buildReportText();
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>{
      alert('Report copied to clipboard');
    });
  } else {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      alert('Report copied to clipboard');
    } catch(err){
      alert('Copy failed');
    }
    document.body.removeChild(textarea);
  }
}

</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{max-width:100%;overflow-x:hidden;font-family:'DM Sans';background:#F5F0E8;color:#0A1628;}

.header{background:#0A1628;color:#fff;padding:16px;display:flex;justify-content:space-between;}
.header h1{font-family:'Bebas Neue';letter-spacing:2px;font-size:22px;}

.address-bar{background:#fff;padding:12px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:2px solid #D4A017;}
.address-bar input{flex:1;min-width:0;padding:10px;border:1px solid #ddd;border-radius:4px;}
.address-bar button{padding:10px;border:none;border-radius:4px;cursor:pointer;font-weight:600;}
.search-btn{background:#D4A017;}
.geo-btn{background:#1B3A6B;color:#fff;}

#property-map{height:220px;width:100%;}

.section{padding:16px;}
.card{background:#fff;border-radius:6px;padding:14px;margin-bottom:10px;border-left:4px solid #1B3A6B;cursor:pointer;}
.card.active{background:#EBF2FF;}

.summary{background:#0A1628;color:#fff;padding:16px;margin-top:20px;}
.total{font-family:'DM Mono';font-size:22px;color:#D4A017;}

.calc{background:#fff;padding:16px;border-radius:6px;margin-top:20px;}
.calc input{width:100%;padding:8px;margin-bottom:8px;}

.btn{width:100%;padding:12px;margin-top:10px;border:none;border-radius:4px;font-weight:600;cursor:pointer;}
.add-report{background:#1B3A6B;color:#fff;}

@media(max-width:768px){
.address-bar{flex-direction:column;}
.address-bar input,.address-bar button{width:100%;}
}
</style>
</head>

<body>

<div class="header">
  <h1>HOME COST SURVIVAL GUIDE</h1>
  <div>George Kindler</div>
</div>

<div class="address-bar">
  <input id="propAddress" placeholder="Enter property address">
  <button class="search-btn" onclick="searchAddress()">MAP</button>
  <button class="geo-btn" id="geoBtn" onclick="geoLocate()">Use My Location</button>
</div>

<div id="property-map"></div>

<div class="section">
  <h2>SELECT ISSUES</h2>

  <div class="card" onclick="toggleItem('Electrical Panel',2500,5000,this)">
    Electrical Panel ($2.5k–$5k)
  </div>

  <div class="card" onclick="toggleItem('Sewer Lateral',8000,20000,this)">
    Sewer Lateral ($8k–$20k)
  </div>

  <div class="card" onclick="toggleItem('HVAC',6500,12000,this)">
    HVAC ($6.5k–$12k)
  </div>

</div>

<div class="section calc">
  <h2>SQ FT CALCULATOR</h2>
  <input id="length" placeholder="Length (ft)">
  <input id="width" placeholder="Width (ft)">

  <div style="margin:8px 0 10px;font-size:12px;color:#555;">Select work type:</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <label><input type="radio" name="workType" value="paint" checked> Interior Paint ($2–$4)</label>
    <label><input type="radio" name="workType" value="drywall"> Drywall ($5–$10)</label>
    <label><input type="radio" name="workType" value="flooring"> Flooring ($6–$15)</label>
    <label><input type="radio" name="workType" value="demo"> Demo ($2–$6)</label>
  </div>

  <button class="btn" onclick="calculateSF()">Calculate</button>
  <div id="sfResult"></div>
  <button class="btn add-report" onclick="addSFToReport()">Add to Report</button>
</div>

<div class="summary">
  <h2>REPORT TOTAL</h2>
  <div id="reportItems"></div>
  <div class="total" id="totalCost">$0  <div style="margin-top:16px;">
    <h3 style="font-family:'Bebas Neue';margin-bottom:6px;">EMAIL THIS REPORT</h3>
    <input id="userName" placeholder="Your Name" style="width:100%;padding:8px;margin-bottom:6px;">
    <input id="userEmail" placeholder="Your Email" style="width:100%;padding:8px;margin-bottom:6px;">
    <label style="font-size:12px;display:flex;gap:6px;align-items:center;margin-bottom:10px;">
      <input type="checkbox" id="ccMe"> Send a copy to George
    </label>
    <button class="btn add-report" onclick="sendReport()">Send My Report</button>
    <button class="btn" onclick="copyReport()" style="background:#0A1628;color:#fff;margin-top:8px;">Copy Report</button>
  </div>
</div>

<script>
let map = L.map('property-map').setView([38.6270,-90.1994],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function geoLocate(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude,lng=pos.coords.longitude;
map.setView([lat,lng],15);
L.marker([lat,lng]).addTo(map);
});
}

async function searchAddress(){
let addr=document.getElementById('propAddress').value;
let res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}`);
let data=await res.json();
if(data.length){
map.setView([data[0].lat,data[0].lon],15);
L.marker([data[0].lat,data[0].lon]).addTo(map);
}
}

let report=[];

function toggleItem(name,low,high,el){
let index=report.findIndex(i=>i.name===name);
if(index>-1){
report.splice(index,1);
el.classList.remove('active');
}else{
report.push({name,low,high});
el.classList.add('active');
}
updateReport();
}

let sfValue=0;

function calculateSF(){
  let l = parseFloat(document.getElementById('length').value);
  let w = parseFloat(document.getElementById('width').value);
  if(!l || !w) return;

  sfValue = l * w;

  const type = document.querySelector('input[name="workType"]:checked').value;

  const pricing = {
    paint: {low:2, high:4, label:'Paint'},
    drywall: {low:5, high:10, label:'Drywall'},
    flooring: {low:6, high:15, label:'Flooring'},
    demo: {low:2, high:6, label:'Demo'}
  };

  const p = pricing[type];

  const costLow = Math.round(sfValue * p.low);
  const costHigh = Math.round(sfValue * p.high);

  document.getElementById('sfResult').innerText = `${sfValue} sqft (${p.label}) → $${costLow}–$${costHigh}`;

  // store for report
  window.sfLast = {
    name: `${p.label} (${sfValue} sqft)`,
    low: costLow,
    high: costHigh
  };
} sqft → $${costLow}–$${costHigh}`;
}

function addSFToReport(){
  if(!window.sfLast) return;

  // prevent duplicates
  let exists = report.find(i => i.name === window.sfLast.name);
  if(exists) return;

  report.push(window.sfLast);
  updateReport();
} sqft)`,low:costLow,high:costHigh});
updateReport();
}

function updateReport(){
  let low=0,high=0;
  let html='';
  report.forEach(i=>{
    low+=i.low; high+=i.high;
    html+=`<div>${i.name}: $${i.low}–$${i.high}</div>`;
  });
  document.getElementById('reportItems').innerHTML=html;
  document.getElementById('totalCost').innerText=`$${low} – $${high}`;

  // store totals for email
  window.reportTotals = {low, high};
}: $${i.low}–$${i.high}</div>`;
});
document.getElementById('reportItems').innerHTML=html;
document.getElementById('totalCost').innerText=`$${low} – $${high}`;
}
</script>

</body>
</html>
